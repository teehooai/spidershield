name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe what you'd like.

  - type: dropdown
    id: subsystem
    attributes:
      label: Subsystem
      options:
        - Static Scanner (scan)
        - Description Rewriter (rewrite)
        - Hardener (harden)
        - Agent Security (agent-check)
        - Runtime Guard (guard/proxy)
        - DLP Engine
        - Dataset/CLI
        - New subsystem
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Why is it needed?
      placeholder: |
        I want to scan Rust MCP servers but SpiderShield doesn't detect...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've considered?
