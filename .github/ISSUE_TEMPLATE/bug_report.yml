name: Bug Report
description: Report a bug in SpiderShield
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: input
    id: version
    attributes:
      label: SpiderShield version
      description: Output of `spidershield --version`
      placeholder: "0.3.1"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: "3.12.0"
    validations:
      required: true

  - type: dropdown
    id: subsystem
    attributes:
      label: Subsystem
      options:
        - Static Scanner (scan)
        - Description Rewriter (rewrite)
        - Hardener (harden)
        - Agent Security (agent-check)
        - Runtime Guard (guard/proxy)
        - DLP Engine
        - Dataset/CLI
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. Include the exact command you ran.
      placeholder: |
        I ran `spidershield scan ./my-server` and got...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Create a file `server.py` with...
        2. Run `spidershield scan .`
        3. See error...

  - type: textarea
    id: logs
    attributes:
      label: Error output / traceback
      description: Paste any error messages or tracebacks.
      render: shell
